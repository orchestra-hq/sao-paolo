name: Bug report
description: Report something that is broken or incorrect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        If this involves a **security vulnerability**, do not file here — use the [security policy](../SECURITY.md) instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands, config, or minimal steps that show the problem.
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions help a lot for dbt-adjacent tools.
      value: |
        - orchestra-dbt version:
        - dbt-core version:
        - Python version:
        - OS:
    validations:
      required: false

version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: src_orders
        config:
          freshness:
            warn_after: { count: 24, period: hour }
          loaded_at_field: order_date
      - name: src_customers
      - name: src_tickets
        config:
          freshness:
            warn_after: { count: 24, period: hour }
          loaded_at_query: "SELECT MAX(ticket_date) FROM {{ this }} WHERE valid = true"

models:
  - name: stg_orders
    description: "Cleaned and standardized orders data"
    columns:
      - name: order_id
        description: "Order ID per order hello world v2!"
        tests:
          - not_null
          - unique
    config:
      tags:
        - a
      meta:
        owner:
          - "adam@test.io"
          - "brett@test.io"

  - name: stg_customers
    description: "Cleaned and standardized customers data"
    config:
      tags:
        - b
      meta:
        owner: "eve@test.io"
        # team_owner: "!subteam^S0A6R0YDZKP"
        channel: "alert-testing"

  - name: int_orders
    description: "Intermediate orders table for further aggregations"
    config:
      tags:
        - a
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_id IS NOT NULL"
          config:
            warn_if: "= 0"
            error_if: "> 100"
            severity: warn

  - name: cust_orders
    description: "Final mart combining customers and their orders"
    columns:
      - name: total_customer_spend
        description: "Total customer spend"
        tests:
          - not_null
      - name: tax_by_region
        config:
          meta:
            dimension:
              type: number
              sql: |
                case
                  when ${lightdash.parameters.region} = 'EMEA'
                    then ${TABLE}.total_customer_spend * 0.2
                  when ${lightdash.parameters.region} = 'APAC'
                    then ${TABLE}.total_customer_spend * 0.1
                  when ${lightdash.parameters.region} = 'AMER'
                    then ${TABLE}.total_customer_spend * 0.15
                end
    config:
      freshness:
        build_after:
          count: 10
          period: minute
          updates_on: all
      tags:
        - a
        - b

  - name: dim_customers
    description: "Dimension table for customers"
    config:
      freshness:
        build_after:
          count: 6
          period: minute
      tags:
        - b

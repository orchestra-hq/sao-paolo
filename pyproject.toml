[project]
name = "orchestra-dbt"
version = "0.3.0"
description = "Stateful orchestration for dbt Core projects in Orchestra."
authors = [{ name = "Oliver Crawford" }]
readme = "README.md"
requires-python = ">=3.11,<3.15"
dependencies = ["click", "httpx", "packaging", "pydantic", "pyyaml"]

[project.optional-dependencies]
dev = [
    "basedpyright",
    "dbt-core>=1.10,<1.12",
    "pytest-httpx",
    "pytest",
    "ruff",
]
# Warehouse adapters (optional). Not required for tests; some may lack wheels for the newest Python.
adapters = [
    "dbt-databricks",
    "dbt-snowflake",
]

debug = [
    "awscrt",
    "boto3",
    "graphviz",
]

[project.scripts]
orchestra-dbt = "orchestra_dbt.cli:main"

[tool.basedpyright]
typeCheckingMode = "basic"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
package = true

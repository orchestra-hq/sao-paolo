[project]
name = "orchestra-dbt"
version = "0.3.0"
description = "Stateful orchestration for dbt Core projects in Orchestra."
authors = [{ name = "Oliver Crawford" }]
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = ["click", "httpx", "packaging", "pydantic", "pyyaml"]

[project.optional-dependencies]
dev = [
    "basedpyright",
    "boto3",
    "dbt-core>=1.10,<1.12",
    "pytest-httpx",
    "pytest",
    "ruff",
]

# Warehouse adapters (optional). Not required for tests.
adapters = ["dbt-postgres"]

debug = ["awscrt", "boto3", "graphviz"]

# S3-backed state (optional; boto3 loaded only when S3 URI is configured)
s3 = ["boto3"]

[project.scripts]
orchestra-dbt = "orchestra_dbt.cli:main"

[tool.basedpyright]
typeCheckingMode = "basic"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
package = true

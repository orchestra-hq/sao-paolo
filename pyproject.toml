[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "orchestra-dbt"
version = "0.3.0"
description = "Stateful orchestration for dbt Core projects in Orchestra."
authors = [{ name = "Oliver Crawford" }]
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.11"
dependencies = ["click", "httpx", "pydantic", "pyyaml"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Build Tools",
]

[project.urls]
Repository = "https://github.com/orchestra-hq/sao-paolo"
Issues = "https://github.com/orchestra-hq/sao-paolo/issues"

[project.optional-dependencies]
dev = [
    "basedpyright",
    "dbt-core",
    "dbt-databricks",
    "dbt-snowflake", # Change/add adapters for local development requirements.
    "pytest-httpx",
    "pytest",
    "ruff",
]

debug = [
    "awscrt",
    "boto3",
    "graphviz",
]

[project.scripts]
orchestra-dbt = "orchestra_dbt.cli:main"

[tool.basedpyright]
typeCheckingMode = "basic"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
package = true

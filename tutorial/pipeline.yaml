# Import into Orchestra or paste from the product UI after creating the pipeline.
# Replace placeholder UUIDs and connection id with values from your workspace.
version: v1
name: sao-paolo tutorial (dbt Core state)
pipeline:
  00000000-0000-4000-8000-000000000001:
    tasks:
      00000000-0000-4000-8000-000000000002:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt build
          package_manager: PIP
          python_version: "3.12"
          use_state_orchestration: true
          project_dir: tutorial/dbt
          shallow_clone_dirs: tutorial/dbt
          environment_variables: '{"DBT_SCHEMA": "${{ ENV.DBT_SCHEMA }}"}'
        depends_on: []
        name: dbt build
        connection: REPLACE_WITH_YOUR_DBT_CONNECTION_ID
    depends_on: []
    name: Tutorial
webhook:
  enabled: false
